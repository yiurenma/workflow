# Push to `main` → POST Vercel Deploy Hook（在 Vercel 里为项目创建的「Deploy Hooks」URL）。
#
# GitHub：Settings → Secrets and variables → Actions → New repository secret
#   名称：VERCEL_DEPLOY_HOOK_URL
#   值：  整段 URL，例如
#         https://api.vercel.com/v1/integrations/deploy/prj_xxx/xxxxxxxx
#
# 从你已有的链接里可以读出：
#   - prj_dYkFSwmxyxStWt2amb2TC0MvIc9s  → 即 Vercel 的 Project ID（一般叫 VERCEL_PROJECT_ID）
#   - 最后一段（如 g2GnQpt2Di）是 Hook 密钥，必须和整段 URL 一起保密，不要单独当 TOKEN 用。
#
# Deploy Hook 与「Account Token + vercel CLI」是两套方式：有 Hook 时用这个工作流即可，不必再配 VERCEL_TOKEN。
#
# 若仍要用 CLI（vercel pull / build / deploy），才需要去 https://vercel.com/account/tokens 创建 TOKEN，
# 并在项目 Settings → General 查看 Org / Project ID。
name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deployment (deploy hook)
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "Missing secret VERCEL_DEPLOY_HOOK_URL. Add it under repo Settings → Secrets → Actions."
            exit 1
          fi
          curl -fsS -X POST "$HOOK_URL"
