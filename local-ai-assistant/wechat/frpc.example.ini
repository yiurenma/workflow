# 内网穿透示例（frp 客户端）—— 把家里主机的 cow 回调端口暴露到公网，供企业微信回调。
#
# 背景：企业微信「接收消息」回调 URL 只接受标准端口（80/443），且应走 HTTPS。
# 方案：家里跑 frpc 把本机 9898 映射到 VPS 上的某个 TCP 端口；VPS 上用 Caddy(自动 HTTPS, 443)
#       反代到该端口。最终公网地址 = https://你的域名/wxcomapp
#
#   [个人微信] ⇄ [企业微信云] --回调--> https://你的域名/wxcomapp (VPS:443, Caddy 自动证书)
#                                          └─ reverse_proxy 127.0.0.1:9898 (frps 暴露口)
#                                               └─ frp 隧道 ──> 家里主机 127.0.0.1:9898 (cow wechatcom_app)
#
# 需要：一台有公网 IP 的小 VPS（¥10–30/月）。新版 frp 用 frpc.toml；下面是 .ini（旧格式，多数版本仍支持）。
# 不想自建 VPS？用 cpolar/花生壳 SaaS 穿透更省事（自带 HTTPS 域名），见 README-wechat.md。

# ===== 家里主机：frpc.ini =====
[common]
server_addr = 你的VPS公网IP
server_port = 7000
token = 自己起一个和 frps 一致的密码

[wechatcom-callback]
type = tcp
local_ip = 127.0.0.1
local_port = 9898          # cow 的 wechatcom_app 监听端口（与 config.json 的 wechatcomapp_port 一致）
remote_port = 9898         # 暴露到 VPS 上的端口，供 Caddy 反代

# ===== VPS 上：frps.ini（参考）=====
# [common]
# bind_port = 7000
# token = 和上面一致的密码

# ===== VPS 上：Caddyfile（参考，自动签发并续期 HTTPS 证书）=====
# 你的域名 {
#     reverse_proxy 127.0.0.1:9898
# }
# 之后企业微信「接收消息」URL 填： https://你的域名/wxcomapp
