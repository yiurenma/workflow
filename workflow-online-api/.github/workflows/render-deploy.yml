# Trigger a Render deploy after tests pass (Deploy Hook).
#
# Render dashboard: your Web Service → Settings → Build & Deploy → Deploy Hook → Create hook.
# Copy the hook URL into GitHub: Settings → Secrets → Actions → RENDER_DEPLOY_HOOK_URL
#
# Note: If Render also has "Auto-Deploy" on push enabled, every push may deploy twice.
#       Turn off auto-deploy on Render if you only want this workflow to trigger builds.
#
name: Deploy to Render

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: render-deploy-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn test
        run: mvn -B -DskipITs test
        env:
          SPRING_PROFILES_ACTIVE: test

  deploy:
    name: Trigger Render deploy
    needs: test
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    steps:
      - name: POST Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL is not set. Add it under Repo → Settings → Secrets → Actions."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
